name: Hydrate Complete D2L Sales Command Center Source

on:
  push:
    paths:
      - ".github/workflows/hydrate-command-center-20260705-1832.yml"
      - ".codex-payload/hydrate-20260705-1832/READY"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Hydrate exact source tree from Codex git archive
        shell: bash
        run: |
          set -euo pipefail
          payload_dir=".codex-payload/hydrate-20260705-1832"
          expected_chunks=9
          if [ ! -f "$payload_dir/READY" ]; then
            echo "Payload is not ready yet. Exiting cleanly."
            exit 0
          fi
          tmp_b64="$(mktemp)"
          tmp_tgz="$(mktemp)"
          hydrated_dir="$(mktemp -d)"
          : > "$tmp_b64"
          for i in $(seq -f "%03g" 1 "$expected_chunks"); do
            chunk="$payload_dir/archive.${i}.b64"
            test -s "$chunk"
            cat "$chunk" >> "$tmp_b64"
          done
          base64 -d "$tmp_b64" > "$tmp_tgz"
          tar -xzf "$tmp_tgz" -C "$hydrated_dir"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$hydrated_dir"/. .
          git status --short
      - name: Commit exact source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Publish complete D2L sales command center source"
          git push
